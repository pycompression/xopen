[tox]
envlist = black,ruff,mypy,py39,py310,py311,py312,py313
isolated_build = True

[testenv]
deps =
    pytest
    pytest-timeout
    coverage
setenv =
    PYTHONDEVMODE = 1
    PYTHONWARNDEFAULTENCODING = 1
commands =
    coverage run --source=xopen,tests -m pytest -v --doctest-modules tests
    coverage report
    coverage xml
    coverage html

[testenv:zstd]
deps =
    {[testenv]deps}
    zstandard

[testenv:no-libs]
commands=
    pip uninstall -y isal zlib-ng
    {[testenv]commands}

[testenv:black]
basepython = python3.10
deps = black==22.3.0
skip_install = true
commands = black --check src/ tests/

[testenv:ruff]
basepython = python3.10
deps = ruff
commands = ruff check src/ tests/
skip_install = true

[testenv:mypy]
basepython = python3.10
deps = mypy
commands = mypy src/
